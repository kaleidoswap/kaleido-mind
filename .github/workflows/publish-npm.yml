name: Publish npm package (@kaleidorg/mind)

# Publishes packages/core to npm on push to main. The "skip if already
# published" guard means it only actually publishes when the version in
# packages/core/package.json changes — so a normal main push is a no-op until
# you bump the version. Requires an NPM_TOKEN secret on the repo/org.
on:
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Build package
        run: pnpm run build

      - name: Read package metadata
        id: pkg
        run: |
          {
            echo "name=$(node -p "require('./package.json').name")"
            echo "version=$(node -p "require('./package.json').version")"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if version already published
        id: npm_check
        env:
          PKG_NAME: ${{ steps.pkg.outputs.name }}
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.npm_check.outputs.already_published == 'false' && github.event.repository.private == false
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm without provenance
        if: steps.npm_check.outputs.already_published == 'false' && github.event.repository.private == true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report already published version
        if: steps.npm_check.outputs.already_published == 'true'
        run: echo "Version already published. Nothing to do."
