name: Publish npm package (@kaleidorg/mind-provider)

# Publishes apps/provider to npm on push to main. Guarded by a "skip if already
# published" check, so it only actually publishes when apps/provider/package.json
# version changes. Uses pnpm publish (not npm) so the `@kaleidorg/mind`
# workspace:^ dependency is rewritten to a real version range on publish.
on:
  push:
    branches: [main]
    paths:
      - 'apps/provider/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      - name: Read package metadata
        id: pkg
        working-directory: apps/provider
        run: |
          {
            echo "name=$(node -p "require('./package.json').name")"
            echo "version=$(node -p "require('./package.json').version")"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if version already published
        id: npm_check
        env:
          PKG_NAME: ${{ steps.pkg.outputs.name }}
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.npm_check.outputs.already_published == 'false'
        run: pnpm --filter @kaleidorg/mind-provider publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report already published version
        if: steps.npm_check.outputs.already_published == 'true'
        run: echo "Version already published. Nothing to do."
